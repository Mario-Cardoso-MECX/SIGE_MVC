<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula de Medios</title>

    <script src="js/auth-guard.js"></script>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/aulas.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <main class="main-content">
            <header class="top-bar">
                <div class="header-title">
                    <h1><i class="fas fa-laptop-house"></i>Aula de Medios</h1>
                </div>
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="nombreUsuarioSaludo">Cargando...</span>
                </div>
            </header>

            <div class="card-accion" id="panelSolicitud">
                <div class="card-header">
                    <h2><i class="fas fa-calendar-plus"></i> Solicitar Horario</h2>
                </div>
                <form id="formReservaAula" onsubmit="event.preventDefault(); solicitarReserva();">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Fecha de la clase:</label>
                            <input type="date" id="txtFechaReserva" class="input-grande" required>
                        </div>
                        <div class="form-group">
                            <label>Hora de Inicio:</label>
                            <select id="selHoraInicio" class="input-grande" required>
                                <option value="">Selecciona hora...</option>
                                <option value="08:00:00">08:00 AM</option>
                                <option value="09:00:00">09:00 AM</option>
                                <option value="10:00:00">10:00 AM</option>
                                <option value="11:00:00">11:00 AM</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Hora de Fin:</label>
                            <select id="selHoraFin" class="input-grande" required>
                                <option value="">Selecciona hora...</option>
                                <option value="09:00:00">09:00 AM</option>
                                <option value="10:00:00">10:00 AM</option>
                                <option value="11:00:00">11:00 AM</option>
                                <option value="12:00:00">12:00 PM</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Motivo / Actividad:</label>
                            <input type="text" id="txtMotivo" class="input-grande" placeholder="Ej: Examen en línea..." required>
                        </div>

                        <div class="form-group" style="display:flex; align-items:flex-end;">
                            <button type="submit" class="btn-verde" style="width:100%; margin:0;">
                                <i class="fas fa-paper-plane"></i> Enviar Solicitud
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card-accion">
                <div class="card-header">
                    <h2><i class="fas fa-list"></i> Agenda y Solicitudes</h2>
                </div>
                <div class="tabla-container" style="max-height: 50vh; overflow-y: auto;">
                    <table id="tablaAulas">
                        <thead>
                            <tr>
                                <th>Profesor</th>
                                <th>Fecha</th>
                                <th>Horario</th>
                                <th>Estatus</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaAulasBody">
                            <tr><td colspan="5">Cargando agenda...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://kit.fontawesome.com/e2dc84faef.js" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-constructor.js"></script>
    <script src="js/aulas.js"></script>
    <script src="js/saludoUsuario.js"></script>
</body>
</html>
