<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Préstamos</title>

    <script src="js/auth-guard.js"></script> 
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/prestamos.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <main class="main-content">
            <header class="top-bar">
                <div class="header-title">
                    <h1><i class="fas fa-hand-holding"></i> Centro de Préstamos</h1>
                </div>
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="nombreUsuarioSaludo">Cargando...</span>
                </div>
            </header>

            <div class="card-accion step-card">
                <div class="card-header">
                    <h2><i class="fas fa-search"></i> Identificar Alumno / Docente</h2>
                </div>
                <div class="form-padding">
                    <div class="form-group" style="position: relative;">
                        <label>Nombre o Matrícula del Alumno / Docente:</label>
                        <div class="input-wrapper">
                             <i class="fas fa-user search-icon"></i>
                             <input type="text" id="txtBusquedaAlumno" class="input-grande" placeholder="Buscar por Nombre o Matrícula..." autocomplete="off">
                        </div>
                        <div id="listaSugerenciasAlumno" class="sugerencias-dropdown"></div>
                    </div>
                    
                    <div id="infoAlumno" class="estado-alumno">
                        <i class="fas fa-check-circle"></i> Usuario Seleccionado: 
                        <span id="lblNombreAlumnoActivo">---</span> (<span id="lblMatriculaActiva">---</span>)
                    </div>
                </div>
            </div>

            <div id="panelOperaciones" class="panel-control panel-disabled">
                
                <div class="card-accion" style="margin-bottom: 0;">
                    <div class="card-header" style="border-top: none;">
                        <h2><i class="fas fa-upload"></i> Nuevo Préstamo</h2>
                    </div>
                    <form id="formPrestamo" onsubmit="event.preventDefault(); realizarPrestamo();" class="form-padding">
                        <div class="form-group" style="position: relative;">
                            <label>Buscar Material</label>
                            <div class="input-wrapper">
                                <i class="fas fa-book search-icon"></i>
                                <input type="text" id="txtBusquedaMaterial" class="input-grande" placeholder="Ej: Libro de Historia..." autocomplete="off">
                            </div>
                            <div id="listaSugerencias" class="sugerencias-dropdown"></div>
                            <input type="hidden" id="txtMaterialId" data-categoria="">
                        </div>

                        <div id="divDuracionHoras" class="form-group" style="display: none;">
                            <label><i class="fas fa-clock"></i> Duración del préstamo:</label>
                            <select id="selHoras" class="input-grande">
                                <option value="1">1 Hora (Receso / Clase Corta)</option>
                                <option value="2" selected>2 Horas (Bloque Doble)</option>
                                <option value="4">4 Horas (Medio Turno)</option>
                                <option value="6">6 Horas (Turno Completo)</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn-verde">
                            <i class="fas fa-check"></i> Confirmar Préstamo
                        </button>
                        <p id="msgPrestamo" class="resultado-msg"></p>
                    </form>
                </div>

                <div class="card-accion" style="margin-bottom: 0;">
                    <div class="card-header" style="border-top: none;">
                        <h2><i class="fas fa-download"></i> Devoluciones Pendientes</h2>
                    </div>
                    <div class="tabla-container">
                        <table id="tablaDeudas">
                            <thead>
                                <tr>
                                    <th>Material</th>
                                    <th>Límite</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaPendientes">
                                <tr><td colspan="3" style="text-align: center; color: gray;">Sin préstamos activos</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card-accion" id="historial">
                <div class="card-header">
                    <h2><i class="fas fa-history"></i> Últimos Movimientos</h2>
                </div>
                
                <div class="filter-bar-orange" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                    <strong style="color: #9a3412;"><i class="fas fa-filter"></i> Filtrar historial:</strong>
                    <button class="chip active" onclick="filtrarHistorial('Todos', this)">Todos</button>
                    <button class="chip" onclick="filtrarHistorial('Pendientes', this)">⏳ En tiempo</button>
                    <button class="chip btn-vencidos" onclick="filtrarHistorial('Vencidos', this)">⚠️ Vencidos</button>
                </div>

                <div class="tabla-container">
                    <table id="tablaGeneralHistorial">
                        <thead>
                            <tr>
                                <th>Alumno / Docente</th>
                                <th>Material</th>
                                <th>Fecha Préstamo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tablaHistorial">
                            <tr><td colspan="4" style="text-align: center;">Cargando historial...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://kit.fontawesome.com/e2dc84faef.js" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/prestamos.js"></script>
    <script src="js/saludoUsuario.js"></script>
    <script src="js/ui-constructor.js"></script>
</body>
</html>
