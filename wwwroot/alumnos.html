<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alumnos</title>

    <script src="js/auth-guard.js"></script>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/alumnos.css">
    <link rel="stylesheet" href="css/main.css">
    
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <main class="main-content">
            <header class="top-bar">
                <div class="header-title">
                    <h1><i class="fas fa-users-cog"></i>Alumnos</h1>
                </div>
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="nombreUsuarioSaludo">Cargando...</span>
                </div>
            </header>

            <div class="card-accion">
                <div class="card-header">
                    <h2><i class="fas fa-user-plus"></i> Registrar Nuevo Alumno</h2>
                </div>
                <form id="formNuevoAlumno" onsubmit="event.preventDefault(); registrarAlumno();">
                    
                    <input type="hidden" id="txtIdAlumno" value="">

                    <div class="form-grid">
                        <div class="form-group">
                            <label><i class="fas fa-signature"></i> Nombre(s):</label>
                            <input type="text" id="nombreAlumno" class="input-grande" placeholder="Ej: Juan" 
                                pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$" title="Solo se permiten letras" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-signature"></i> Apellidos:</label>
                            <input type="text" id="apellidoAlumno" class="input-grande" placeholder="Ej: Pérez López" 
                                pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$" title="Solo se permiten letras" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-graduation-cap"></i> Grado:</label>
                            <select id="gradoAlumno" class="input-grande" required>
                                <option value="">Selecciona Grado</option>
                                <option value="1°">1° Primero</option>
                                <option value="2°">2° Segundo</option>
                                <option value="3°">3° Tercero</option>
                                <option value="4°">4° Cuarto</option>
                                <option value="5°">5° Quinto</option>
                                <option value="6°">6° Sexto</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-users"></i> Grupo:</label>
                            <select id="grupoLetra" class="input-grande" required>
                                <option value="">Selecciona Grupo</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <button type="submit" class="btn-verde">
                            <i class="fas fa-id-card"></i> Registrar y Generar Matrícula
                        </button>
                        <button type="button" class="btn-cancelar" onclick="limpiarFormularioAlumno()">
                            <i class="fas fa-undo"></i> Limpiar
                        </button>
                    </div>
                </form>
                <div id="resultadoRegistro" class="resultado-msg"></div>
            </div>

            <div class="search-container" style="display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px;">
                
                <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap; width: 100%;">
                    <div class="input-wrapper" style="flex: 1; min-width: 250px;">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="txtFiltrarAlumnos" class="input-grande" placeholder="Buscar por nombre o matrícula...">
                    </div>
                    
                    <select id="selFiltroGrado" class="input-grande" style="width: auto; padding-left: 15px; border-radius: 25px;">
                        <option value="">Todos los grados</option>
                        <option value="1°">1° Grado</option>
                        <option value="2°">2° Grado</option>
                        <option value="3°">3° Grado</option>
                        <option value="4°">4° Grado</option>
                        <option value="5°">5° Grado</option>
                        <option value="6°">6° Grado</option>
                        <option value="Egresado">Egresados</option>
                    </select>

                    <select id="selFiltroLetra" class="input-grande" style="width: auto; padding-left: 15px; border-radius: 25px;">
                        <option value="">Todos los grupos</option>
                        <option value="A">Grupo A</option>
                        <option value="B">Grupo B</option>
                        <option value="C">Grupo C</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: flex-end; width: 100%;">
                    
                    <button id="btnBorrarEgresados" onclick="eliminarEgresadosMasivo()" style="display: none; background-color: #dc2626; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <i class="fa-solid fa-broom"></i> Limpiar Egresados
                    </button>

                    <button id="btnImprimirCredenciales" style="background-color: #8e44ad; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="imprimirCredencialesFiltradas()">
                        <i class="fas fa-id-card-clip"></i> Imprimir Credenciales
                    </button>

                    <button id="btnSincronizarFotos" style="background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="sincronizarFotosMasivas()">
                        <i class="fas fa-sync-alt"></i> Sincronizar Fotos
                    </button>

                    <button id="btnExportarExcel" style="background-color: #27ae60; color: white; border: none; border-bottom: 3px solid #1e8449; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="preguntarExportacionExcel()">
                        <i class="fas fa-file-excel"></i> Descargar Excel
                    </button>

                    <button id="btnPromocion" style="background-color: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onclick="promoverCicloEscolar()">
                        <i class="fas fa-user-graduate"></i> Cierre de Ciclo
                    </button>
                </div>
            </div>

            <div class="tabla-container">
                <table id="tablaAlumnos">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> Matrícula</th>
                            <th><i class="fas fa-user"></i> Nombre Completo</th>
                            <th><i class="fas fa-graduation-cap"></i> Grupo</th>
                            <th><i class="fas fa-tools"></i> Acciones</th> 
                        </tr>
                    </thead>
                    <tbody id="tablaAlumnosBody">
                        <tr>
                            <td colspan="4">
                                <i class="fas fa-spinner fa-spin"></i> Cargando alumnos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <input type="file" id="inputFotoAlumno" accept="image/png, image/jpeg" style="display: none;" onchange="procesarSubidaFoto(this)">
    <input type="hidden" id="matriculaTemporalFoto">

    <div id="modalCredencial" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div style="background: white; padding: 25px; border-radius: 16px; max-width: 350px; width: 90%; text-align: center; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <button onclick="cerrarModalCredencial()" style="position: absolute; top: 10px; right: 15px; background: transparent; border: none; font-size: 24px; color: #94a3b8; cursor: pointer;">&times;</button>
            <h3 style="color: #27ae60; margin-bottom: 20px; font-weight: bold;"><i class="fas fa-id-badge"></i> Previsualización</h3>
            
            <div id="credencialContenedor" style="border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%); position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 54mm; height: 85.6mm; box-sizing: border-box; margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
                
                <div style="background: #2c3e50; color: white; padding: 6px; margin: -10px -10px 10px -10px; font-weight: bold; font-size: 0.65rem; letter-spacing: 1px; width: calc(100% + 20px);">
                    PRIMARIA BENITO JUÁREZ
                </div>
                
                <img id="credFoto" src="" alt="Foto Alumno" style="width: 25mm; height: 25mm; min-height: 25mm; object-fit: cover; border-radius: 50%; border: 3px solid #3498db; margin-bottom: 5px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                
                <div style="height: 2.2rem; display: flex; align-items: center; justify-content: center; width: 100%; overflow: hidden; margin-bottom: 2px;">
                    <h4 id="credNombre" style="margin: 0; color: #1e293b; font-size: 0.75rem; text-transform: uppercase; text-align: center; line-height: 1.1;">NOMBRE ALUMNO</h4>
                </div>
                
                <p style="margin: 2px 0; color: #475569; font-weight: bold; font-size: 0.65rem;">MATRÍCULA: <span id="credMatricula" style="color: #e74c3c;">---</span></p>
                <p style="margin: 2px 0; color: #475569; font-weight: bold; font-size: 0.65rem;">GRUPO: <span id="credGrupo" style="color: #27ae60;">---</span></p>
                
                <div style="margin-top: auto; padding-top: 5px; border-top: 1px dashed #cbd5e1; width: 100%;">
                    <svg id="credBarcode" style="max-width: 100%; height: auto;"></svg>
                </div>
            </div>

            <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn-verde" onclick="imprimirCredencial()" style="width: 100%; border-radius: 8px; padding: 12px; font-size: 1rem;"><i class="fas fa-print"></i> Imprimir Credencial</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://kit.fontawesome.com/e2dc84faef.js" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-constructor.js"></script>
    <script src="js/alumnos.js"></script>
    <script src="js/saludoUsuario.js"></script>
</body>
</html>
